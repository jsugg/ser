name: CodeQL

on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - "pyproject.toml"
      - "ser/**"
      - "scripts/**"
      - "tests/**"
  push:
    branches: [main]
  schedule:
    - cron: "30 7 * * 2"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze Python
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:python"
