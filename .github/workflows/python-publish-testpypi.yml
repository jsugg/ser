name: Publish Python Package (TestPyPI Prerelease)

on:
  release:
    types: [published]

concurrency:
  group: testpypi-publish-${{ github.event.release.tag_name || github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify-ci:
    if: ${{ github.event.release.prerelease == true }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read

    outputs:
      head_sha: ${{ steps.sha.outputs.head_sha }}

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.release.tag_name }}
      - name: Resolve release commit SHA
        id: sha
        run: echo "head_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - name: Verify CI passed for release commit
        env:
          CI_HEAD_SHA: ${{ steps.sha.outputs.head_sha }}
          GITHUB_TOKEN: ${{ github.token }}
        run: python ./scripts/workflows/verify_ci_release.py

  linux-cli-validation:
    needs: verify-ci
    uses: ./.github/workflows/linux-python-3_13-cli-validation.yml
    with:
      run_accurate_research: false

  darwin-validation:
    needs: verify-ci
    uses: ./.github/workflows/darwin-x86_64-validation.yml

  build-distributions:
    needs: [verify-ci, linux-cli-validation, darwin-validation]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout release commit
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.verify-ci.outputs.head_sha }}
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build distributions
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
      - name: Check distribution metadata
        run: python -m twine check --strict dist/*
      - name: Upload distributions artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish-to-testpypi:
    needs: [verify-ci, linux-cli-validation, darwin-validation, build-distributions]
    runs-on: ubuntu-latest

    environment:
      name: testpypi
      url: https://test.pypi.org/p/ser
    permissions:
      actions: read
      id-token: write

    steps:
      - name: Download distributions artifact
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
      - name: Publish package to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
