name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest

    outputs:
      run_full: ${{ steps.classify.outputs.run_full }}
      docs_only: ${{ steps.classify.outputs.docs_only }}
      reason: ${{ steps.classify.outputs.reason }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Classify pull request change scope
        id: classify
        env:
          CI_EVENT_NAME: ${{ github.event_name }}
          CI_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          CI_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: ./scripts/ci_classify_changes.sh "$GITHUB_OUTPUT"

  architecture-docs:
    needs: [changes]
    if: needs.changes.outputs.run_full == 'true' || needs.changes.outputs.docs_only == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-architecture-docs-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-architecture-docs-

      - name: Validate architecture docs
        run: make architecture-docs

  code-quality:
    needs: [changes]
    if: needs.changes.outputs.run_full == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-code_quality-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-code_quality-

      - name: Cache pre-commit
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-py3.12-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-py3.12-

      - name: Run linters and type checks (pre-push stage)
        run: make prepush-check

  resolve:
    needs: [changes]
    if: needs.changes.outputs.run_full == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-resolve-py${{ matrix.python-version }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-resolve-py${{ matrix.python-version }}-

      - name: Validate dependency resolution
        run: uv sync --frozen --python ${{ matrix.python-version }} --all-extras --dry-run

  tests:
    needs: [changes]
    if: needs.changes.outputs.run_full == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-py${{ matrix.python-version }}-

      - name: Run tests
        run: uv run --frozen --python ${{ matrix.python-version }} --extra dev pytest -q

      - name: Enforce Python 3.13 medium contract checks
        if: matrix.python-version == '3.13'
        run: >
          uv run --frozen --python ${{ matrix.python-version }} --extra dev --extra medium pytest -q
          tests/test_medium_inference.py
          tests/test_medium_timeout_and_fallback.py
          tests/test_backend_hooks.py
          tests/test_runtime_registry.py
          tests/test_runtime_pipeline.py

  contract-gates:
    runs-on: ubuntu-latest
    needs: [changes, code-quality, resolve]
    if: needs.changes.outputs.run_full == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-contract-gates-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-contract-gates-

      - name: Enforce API import boundary lint gate
        run: make import-lint

      - name: Enforce transcription benchmark contract gate
        run: >
          uv run --frozen --python 3.12 --extra dev pytest -q
          tests/test_transcription_profiling.py

  build:
    runs-on: ubuntu-latest
    needs: [changes, code-quality, resolve]
    if: needs.changes.outputs.run_full == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-build-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-build-

      - name: Build package
        run: uv build

      - name: Check package metadata
        run: |
          python -m pip install --upgrade twine
          twine check dist/*

      - name: Smoke-test wheel installation
        run: |
          python -m venv .pkg-smoke
          . .pkg-smoke/bin/activate
          python -m pip install --upgrade pip
          pip install --no-deps dist/*.whl
          tmp_dir="$(mktemp -d)"
          cd "$tmp_dir"
          python - <<'PY'
          import importlib.metadata as md
          import ser

          print(f"Installed ser version: {md.version('ser')}")
          print(f"Imported from: {ser.__file__}")
          print(f"Exports: {', '.join(ser.__all__)}")
          PY
