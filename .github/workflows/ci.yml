name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest

    outputs:
      run_full: ${{ steps.classify.outputs.run_full }}
      docs_only: ${{ steps.classify.outputs.docs_only }}
      reason: ${{ steps.classify.outputs.reason }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Classify pull request change scope
        id: classify
        env:
          CI_EVENT_NAME: ${{ github.event_name }}
          CI_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          CI_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: ./scripts/ci_classify_changes.sh "$GITHUB_OUTPUT"

  code-quality:
    needs: [changes]
    if: needs.changes.outputs.run_full == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Cache uv
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-code_quality-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-code_quality-

      - name: Cache pre-commit
        uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-py3.12-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-py3.12-

      - name: Verify lockfile freshness
        run: make lock-check

      - name: Run linters and type checks (pre-push stage)
        run: make prepush-check

      - name: Run CI/CD policy contract tests
        run: make ci-contracts

      - name: Lint GitHub Actions workflows
        run: make workflow-lint

  resolve:
    needs: [changes]
    if: needs.changes.outputs.run_full == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Cache uv
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-resolve-py${{ matrix.python-version }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-resolve-py${{ matrix.python-version }}-

      - name: Validate dependency resolution
        run: uv sync --frozen --python ${{ matrix.python-version }} --all-extras --dry-run

  tests:
    needs: [changes]
    if: needs.changes.outputs.run_full == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Cache uv
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-py${{ matrix.python-version }}-

      - name: Run tests
        run: >
          uv run --frozen --python ${{ matrix.python-version }} --extra dev pytest -q
          --junitxml=reports/pytest/pytest-${{ matrix.python-version }}.xml

      - name: Enforce Python 3.13 organized workflow suites
        if: matrix.python-version == '3.13'
        run: >
          uv run --frozen --python ${{ matrix.python-version }} --extra dev --extra medium pytest -q
          tests/suites
          --junitxml=reports/pytest/pytest-suites-${{ matrix.python-version }}.xml

      - name: Upload pytest reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pytest-reports-${{ matrix.python-version }}
          path: reports/pytest/*.xml
          if-no-files-found: warn
          retention-days: 7

  coverage:
    needs: [changes]
    if: needs.changes.outputs.run_full == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Cache uv
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-coverage-py3.12-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-coverage-py3.12-

      - name: Enforce branch coverage threshold
        run: make test-cov

      - name: Write coverage summary
        if: always()
        run: |
          {
            echo "### Coverage gate"
            echo
            echo "- Command: \`make test-cov\`"
            echo "- XML: \`coverage.xml\`"
            echo "- HTML: \`htmlcov/index.html\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-reports
          path: |
            coverage.xml
            htmlcov/
          if-no-files-found: warn
          retention-days: 7

  contract-gates:
    runs-on: ubuntu-latest
    needs: [changes, code-quality, resolve]
    if: needs.changes.outputs.run_full == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Cache uv
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-contract-gates-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-contract-gates-

      - name: Enforce API import boundary lint gate
        run: make import-lint

      - name: Enforce organized smoke and process-isolation suites
        run: >
          uv run --frozen --python 3.12 --extra dev pytest -q
          tests/suites
          -m "smoke or process_isolation"

      - name: Enforce transcription benchmark contract gate
        run: >
          uv run --frozen --python 3.12 --extra dev pytest -q
          tests/suites/unit/internal/transcription/test_transcription_profiling.py

  build:
    runs-on: ubuntu-latest
    needs: [changes, code-quality, resolve]
    if: needs.changes.outputs.run_full == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Cache uv
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-build-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-build-

      - name: Build package
        run: uv build

      - name: Check package metadata
        run: uvx --from twine twine check --strict dist/*

      - name: Smoke-test wheel installation
        run: ./scripts/workflows/smoke_test_wheel_install.sh

      - name: Write build summary
        if: always()
        run: |
          {
            echo "### Build gate"
            echo
            echo "- Command: \`uv build\`"
            echo "- Metadata: \`uvx --from twine twine check --strict dist/*\`"
            echo "- Wheel smoke: \`./scripts/workflows/smoke_test_wheel_install.sh\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload build distributions
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ci-build-distributions
          path: dist/
          if-no-files-found: warn
          retention-days: 7

  required-ci:
    runs-on: ubuntu-latest
    needs:
      - changes
      - code-quality
      - resolve
      - tests
      - coverage
      - contract-gates
      - build
    if: ${{ always() }}

    steps:
      - name: Evaluate required CI gates
        env:
          RUN_FULL: ${{ needs.changes.outputs.run_full }}
          DOCS_ONLY: ${{ needs.changes.outputs.docs_only }}
          CLASSIFIER_REASON: ${{ needs.changes.outputs.reason }}
          CHANGES_RESULT: ${{ needs.changes.result }}
          CODE_QUALITY_RESULT: ${{ needs.code-quality.result }}
          RESOLVE_RESULT: ${{ needs.resolve.result }}
          TESTS_RESULT: ${{ needs.tests.result }}
          COVERAGE_RESULT: ${{ needs.coverage.result }}
          CONTRACT_GATES_RESULT: ${{ needs.contract-gates.result }}
          BUILD_RESULT: ${{ needs.build.result }}
        run: |
          set -euo pipefail

          {
            echo "### Required CI aggregate"
            echo
            echo "| Gate | Result |"
            echo "| --- | --- |"
            echo "| changes | ${CHANGES_RESULT} |"
            echo "| code-quality | ${CODE_QUALITY_RESULT} |"
            echo "| resolve | ${RESOLVE_RESULT} |"
            echo "| tests | ${TESTS_RESULT} |"
            echo "| coverage | ${COVERAGE_RESULT} |"
            echo "| contract-gates | ${CONTRACT_GATES_RESULT} |"
            echo "| build | ${BUILD_RESULT} |"
            echo
            echo "Classifier reason: \`${CLASSIFIER_REASON:-unknown}\`"
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ "$CHANGES_RESULT" != "success" ]]; then
            echo "Change classification failed: ${CHANGES_RESULT}" >&2
            exit 1
          fi

          if [[ "$RUN_FULL" == "false" && "$DOCS_ONLY" == "true" ]]; then
            if [[ "$CLASSIFIER_REASON" != "docs_only_pull_request" ]]; then
              echo "Docs-only skip used unexpected reason: ${CLASSIFIER_REASON}" >&2
              exit 1
            fi
            echo "Docs-only pull request: heavy gates skipped intentionally."
            exit 0
          fi

          if [[ "$RUN_FULL" != "true" ]]; then
            echo "Unexpected classifier output: run_full=${RUN_FULL}, docs_only=${DOCS_ONLY}" >&2
            exit 1
          fi

          for gate in \
            CODE_QUALITY_RESULT \
            RESOLVE_RESULT \
            TESTS_RESULT \
            COVERAGE_RESULT \
            CONTRACT_GATES_RESULT \
            BUILD_RESULT; do
            if [[ "${!gate}" != "success" ]]; then
              echo "Required gate failed or skipped: ${gate}=${!gate}" >&2
              exit 1
            fi
          done

          echo "All required CI gates passed."
