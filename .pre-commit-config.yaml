repos:
  - repo: https://github.com/asottile/pyupgrade
    rev: v3.21.2
    hooks:
      - id: pyupgrade
        args: [--py312-plus]
        stages: [pre-commit]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.1
    hooks:
      - id: ruff
        args: [--fix]
        stages: [pre-commit]
      - id: ruff
        stages: [pre-push]

  - repo: https://github.com/psf/black
    rev: 25.12.0
    hooks:
      - id: black
        stages: [pre-commit]
      - id: black
        args: [--check]
        stages: [pre-push]

  - repo: https://github.com/pycqa/isort
    rev: 6.1.0
    hooks:
      - id: isort
        stages: [pre-commit]
      - id: isort
        args: [--check-only]
        stages: [pre-push]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        pass_filenames: false
        args: [ser, tests]
        stages: [pre-push]

  - repo: local
    hooks:
      - id: pyright
        name: pyright
        entry: uv run --frozen --extra dev pyright --pythonversion 3.12 ser tests
        language: system
        pass_filenames: false
        stages: [pre-push]
